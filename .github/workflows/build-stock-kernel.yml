name: Build Stock Samsung Kernel

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: Samsung build target
        required: true
        default: psq_eur_openx
      build_variant:
        description: Android build variant
        required: true
        default: user
      chipset:
        description: Samsung/Qualcomm chipset codename used by build script
        required: true
        default: sun

jobs:
  build-stock:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout lab repo
        uses: actions/checkout@v4

      - name: Install host packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache flex git-lfs libelf-dev libssl-dev \
            lld llvm make ninja-build python3 python3-pip rsync unzip zip zstd \
            dwarves pahole device-tree-compiler

      - name: Download Samsung source release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download samsung-source-sm-s937b-16 \
            --repo Zichao-xu/galaxy-s25-sm8750-android16-gki-root-lab \
            --pattern 'SM-S937B_16_Opensource.zip' \
            --dir source-drop
          sha256sum source-drop/SM-S937B_16_Opensource.zip
          echo '41bf605cc6cc520dd4dfef6459a3c04bdaa889f65379e8c96280412d4894ca3b  source-drop/SM-S937B_16_Opensource.zip' | sha256sum -c -

      - name: Extract Samsung source
        run: |
          mkdir -p samsung-source kernel-work
          unzip -q source-drop/SM-S937B_16_Opensource.zip -d samsung-source
          sha256sum samsung-source/Kernel.tar.gz samsung-source/Platform.tar.gz
          tar -xzf samsung-source/Kernel.tar.gz -C kernel-work
          grep -R "^VERSION =\|^PATCHLEVEL =\|^SUBLEVEL =" -n \
            kernel-work/kernel_platform/common/Makefile \
            kernel-work/kernel_platform/msm-kernel/Makefile
          mkdir -p kernel-work/out/target/product/psq
          mkdir -p kernel-work/kernel_platform/prebuilts/build-tools/linux-x86
          curl -L --fail --retry 3 --retry-delay 10 \
            https://android.googlesource.com/platform/prebuilts/build-tools/+/refs/tags/android-15.0.0_r3/BUILD.bazel?format=TEXT \
            | base64 --decode > kernel-work/kernel_platform/prebuilts/build-tools/BUILD.bazel
          mkdir -p kernel-work/kernel_platform/prebuilts/build-tools/common
          curl -L --fail --retry 3 --retry-delay 10 \
            -o build-tools-common.tar.gz \
            https://android.googlesource.com/platform/prebuilts/build-tools/+archive/refs/tags/android-15.0.0_r3/common.tar.gz
          tar -xzf build-tools-common.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/build-tools/common
          curl -L --fail --retry 3 --retry-delay 10 \
            -o build-tools-linux-x86.tar.gz \
            https://android.googlesource.com/platform/prebuilts/build-tools/+archive/refs/tags/android-15.0.0_r3/linux-x86.tar.gz
          tar -xzf build-tools-linux-x86.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/build-tools/linux-x86
          mkdir -p kernel-work/kernel_platform/prebuilts/build-tools/path/linux-x86
          curl -L --fail --retry 3 --retry-delay 10 \
            -o build-tools-path-linux-x86.tar.gz \
            https://android.googlesource.com/platform/prebuilts/build-tools/+archive/refs/tags/android-15.0.0_r3/path/linux-x86.tar.gz
          tar -xzf build-tools-path-linux-x86.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/build-tools/path/linux-x86
          ln -sf /usr/bin/python3 kernel-work/kernel_platform/prebuilts/build-tools/path/linux-x86/python3
          test -f kernel-work/kernel_platform/prebuilts/build-tools/BUILD.bazel
          test -d kernel-work/kernel_platform/prebuilts/build-tools/common/bison
          test -x kernel-work/kernel_platform/prebuilts/build-tools/linux-x86/bin/toybox
          mkdir -p kernel-work/kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/sysroot
          curl -L --fail --retry 3 --retry-delay 10 \
            -o gcc-glibc-sysroot.tar.gz \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/+archive/refs/tags/android-15.0.0_r3/sysroot.tar.gz
          tar -xzf gcc-glibc-sysroot.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/sysroot
          ln -sfn ../../../prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8/sysroot \
            kernel-work/kernel_platform/build/kernel/build-tools/sysroot
          test -d kernel-work/kernel_platform/build/kernel/build-tools/sysroot/usr/include
          curl -L --fail --retry 3 --retry-delay 10 \
            https://android.googlesource.com/kernel/prebuilts/build-tools/+/refs/tags/android-15.0.0_r0.2/BUILD.bazel?format=TEXT \
            | base64 --decode > kernel-work/kernel_platform/prebuilts/kernel-build-tools/BUILD.bazel
          mkdir -p kernel-work/kernel_platform/prebuilts/kernel-build-tools/linux-x86
          curl -L --fail --retry 3 --retry-delay 10 \
            -o kernel-build-tools-linux-x86.tar.gz \
            https://android.googlesource.com/kernel/prebuilts/build-tools/+archive/refs/tags/android-15.0.0_r0.2/linux-x86.tar.gz
          tar -xzf kernel-build-tools-linux-x86.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/kernel-build-tools/linux-x86
          test -f kernel-work/kernel_platform/prebuilts/kernel-build-tools/BUILD.bazel
          test -x kernel-work/kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/avbtool
          mkdir -p kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928
          curl -L --fail --retry 3 --retry-delay 10 \
            -o clang-r510928.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-15.0.0_r3/clang-r510928.tar.gz
          tar -xzf clang-r510928.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928
          mkdir -p kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/kleaf
          curl -L --fail --retry 3 --retry-delay 10 \
            -o clang-kleaf.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-15.0.0_r3/kleaf.tar.gz
          tar -xzf clang-kleaf.tar.gz \
            -C kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/kleaf
          test -x kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin/clang
          test -f kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/kleaf/clang_toolchain_repository.bzl
          kernel-work/kernel_platform/prebuilts/clang/host/linux-x86/clang-r510928/bin/clang --version | head -1
          mkdir -p kernel-work/kernel_platform/prebuilts/kernel-build-tools/bazel/linux-x86_64
          curl -L \
            -o kernel-work/kernel_platform/prebuilts/kernel-build-tools/bazel/linux-x86_64/bazel \
            https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x kernel-work/kernel_platform/prebuilts/kernel-build-tools/bazel/linux-x86_64/bazel
          {
            echo ''
            echo '# CI fallback for modules missing from Samsung source drop local BCR.'
            echo 'common --registry=https://bcr.bazel.build'
          } >> kernel-work/kernel_platform/.bazelrc
          find kernel-work -maxdepth 2 -type f | sort | head -80
          du -sh kernel-work

      - name: Build stock kernel
        working-directory: kernel-work
        env:
          USE_BAZEL_VERSION: 7.4.1
        run: |
          set -o pipefail
          chmod +x build_kernel_GKI.sh || true
          ./build_kernel_GKI.sh \
            '${{ inputs.build_target }}' \
            '${{ inputs.build_variant }}' \
            '${{ inputs.chipset }}'
          test -f kernel_platform/gki/dist/Image || {
            echo "::error::kernel_platform/gki/dist/Image was not produced"
            exit 1
          }

      - name: Collect outputs
        if: always()
        run: |
          mkdir -p artifacts/logs artifacts/images artifacts/modules
          cp -f kernel-work/build.log artifacts/logs/build.log 2>/dev/null || true
          find kernel-work -type f \( -name Image -o -name Image.gz -o -name Image.lz4 -o -name dtbo.img -o -name '*.dtb' \) -print -exec cp -f {} artifacts/images/ \; 2>/dev/null || true
          find kernel-work -type f -name '*.ko' -print -exec cp -f {} artifacts/modules/ \; 2>/dev/null || true
          find artifacts -type f -maxdepth 3 -print | sort
          tar -czf stock-kernel-artifacts.tar.gz artifacts

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-samsung-kernel-${{ inputs.build_target }}-${{ github.run_number }}
          path: stock-kernel-artifacts.tar.gz
          retention-days: 14
